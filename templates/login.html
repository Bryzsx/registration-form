{% extends "base.html" %}

{% block title %}Admin Login - NLCF Portal{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="col-lg-4 col-md-6">
        <!-- Login Card -->
        <div class="card glass-card animate-up border-0 shadow-xl overflow-hidden" style="border-radius: 24px;">
            <div class="card-body p-4 p-md-5">
                <!-- Portal Brand/Icon -->
                <div class="text-center mb-5">
                    <img src="{{ url_for('static', filename='img/Logo.jpg') }}" alt="Logo" style="width: 72px; height: 72px; border-radius: 20px; object-fit: cover;" class="mb-4">
                    <h2 class="fw-black text-gradient h3 mb-2">Admin Portal</h2>
                    <p class="text-muted small px-3">Enter your credentials to access the management dashboard.</p>
                </div>
                
                <form method="POST" action="{{ url_for('login') }}">
                    <!-- Username Field -->
                    <div class="mb-4">
                        <label for="username" class="form-label d-flex justify-content-between">
                            <span>Username</span>
                            <i class="bi bi-person text-light"></i>
                        </label>
                        <div class="input-group">
                            <input type="text" class="form-control bg-light border-0 px-3 py-3" id="username" name="username" placeholder="Enter username" required autofocus style="border-radius: 12px;">
                        </div>
                    </div>
                    
                    <!-- Password Field -->
                    <div class="mb-5">
                        <label for="password" class="form-label d-flex justify-content-between">
                            <span>Password</span>
                            <a href="#" class="small text-decoration-none text-accent fw-bold" style="font-size: 0.75rem;">Forgot?</a>
                        </label>
                        <div class="input-group">
                            <input type="password" class="form-control bg-light border-0 px-3 py-3" id="password" name="password" placeholder="Enter password" required style="border-radius: 12px;">
                        </div>
                    </div>
                    
                    <!-- Submit Button -->
                    <div class="d-grid pt-2">
                        <button type="submit" class="btn btn-primary btn-lg shadow-lg py-3" style="border-radius: 16px;">
                            <span class="me-2">Authenticate</span>
                            <i class="bi bi-fingerprint"></i>
                        </button>
                    </div>
                </form>
            </div>
            
            <!-- Bottom Accent -->
            <div style="height: 6px; background: linear-gradient(90deg, var(--accent) 0%, var(--secondary) 100%); opacity: 0.7;"></div>
        </div>
        
        <!-- Navigation Link -->
        <div class="text-center mt-5 animate-up" style="animation-delay: 0.2s">
            <a href="{{ url_for('index') }}" class="text-decoration-none text-muted small fw-bold d-inline-flex align-items-center gap-2 hover-opacity">
                <i class="bi bi-house"></i>
                <span>Back to Public Homepage</span>
            </a>
        </div>
    </div>
</div>

<style>
    .hover-opacity:hover {
        opacity: 0.7;
        transition: opacity 0.2s;
    }
    .form-control:focus {
        box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1) !important;
        background-color: white !important;
    }
</style>
{% endblock %}
