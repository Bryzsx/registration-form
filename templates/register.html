{% extends "base.html" %}

{% block title %}Register - New Life In Christ Fellowship{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-12 col-md-8 col-lg-6">
        <div class="card">
            <div class="card-body p-3 p-md-4 p-lg-5">
                <h2 class="mb-3 mb-md-4">Registration Form</h2>
                
                <form method="POST" action="{{ url_for('register') }}">
                    <div class="row">
                        <div class="col-12 col-md-6 mb-3">
                            <label for="first_name" class="form-label">First Name</label>
                            <input type="text" class="form-control" id="first_name" name="first_name" required>
                        </div>
                        
                        <div class="col-12 col-md-6 mb-3">
                            <label for="last_name" class="form-label">Last Name</label>
                            <input type="text" class="form-control" id="last_name" name="last_name" required>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label for="middle_name" class="form-label">Middle Name <span class="text-muted">(Optional)</span></label>
                        <input type="text" class="form-control" id="middle_name" name="middle_name">
                    </div>
                    
                    <div class="row">
                        <div class="col-12 col-md-6 mb-3">
                            <label for="birth_date" class="form-label">Birth Date</label>
                            <input type="date" class="form-control" id="birth_date" name="birth_date" required onchange="calculateAge()">
                        </div>
                        
                        <div class="col-12 col-md-6 mb-3">
                            <label for="age" class="form-label">Age</label>
                            <input type="text" class="form-control" id="age" name="age" readonly>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label for="church_id" class="form-label">Church Name</label>
                        <select class="form-select" id="church_id" name="church_id" required>
                            <option value="">-- Select Church --</option>
                            {% for church in churches %}
                                <option value="{{ church.id }}">{{ church.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary btn-lg w-100">Complete Registration</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
function calculateAge() {
    const birthDate = document.getElementById('birth_date').value;
    if (!birthDate) return;
    
    fetch('/api/calculate-age', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
        },
        body: JSON.stringify({ birth_date: birthDate })
    })
    .then(response => response.json())
    .then(data => {
        document.getElementById('age').value = data.age;
    });
}

function toggleChurchInput() {
    const select = document.getElementById('church_id');
    const otherDiv = document.getElementById('other_church_div');
    
    if (select.value === 'other') {
        otherDiv.style.display = 'block';
        document.getElementById('church_name').required = true;
    } else {
        otherDiv.style.display = 'none';
        document.getElementById('church_name').required = false;
    }
}
</script>
{% endblock %}
